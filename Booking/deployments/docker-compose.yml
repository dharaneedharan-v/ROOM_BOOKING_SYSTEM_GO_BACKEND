

networks:
  observability:

services:
  postgres:
    image: postgres:16-alpine
    container_name: booking-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2023"
      POSTGRES_DB: booking_go_task_3
      TZ: "Asia/Kolkata"     

    volumes:
      - postgres-data:/var/lib/postgresql/data
    # --- HOLDS UP CODE UNTIL DB ACCEPTS CONNECTIONS ---
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking_go_task_3"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - observability

  training-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
      network: host
    ports:
      - "7080:7080"  # (HostPort:ContainerPort)
    environment:
      TZ: "Asia/Kolkata"   
    env_file:
      - ../envs/env.docker
    # --- SYNCHRONIZED STARTUP CONDITION ---
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - log-data:/app/logs
      - ../envs:/app/envs 
    networks:
      - observability

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - observability

  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yml
      - log-data:/var/log/app
    command: -config.file=/etc/promtail/config.yml
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - observability

volumes:
  log-data:
  postgres-data:

