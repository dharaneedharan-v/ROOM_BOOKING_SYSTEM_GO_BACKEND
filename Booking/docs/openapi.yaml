
openapi: 3.0.3
info:
  title: Room Booking system
  version: 1.0.0
  description: >
    It is a  Use Case — Room Booking Management system for A co-working space manages room bookings through phone calls and a whiteboard.

  contact:
    name: Booking Manager 
    email: support@booking.email.com

servers:
  # - url: https://localhost:8000
  #   description: devlopment Server
  # - url: https://api.booking.com/v1
  #   description: Production Server
  # - url: https://api.booking.com/v1
  #   description: Staging Server
  - url: {BASE_URL}

  
paths:
  /api/v1/booking:
    post:
      tags:
        - Booking
      summary: Book the Meeting Room Avalaible 
      description: >
        
      operationId: chatWithBrewBuddy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            examples:
              createBookingExample:
                summary: Customer requests a room booking
                value:
                  customer_id: 101
                  room_id: 5
                  booking_date: "2026-05-15"
                  start_time: "2026-05-15T09:00:00Z"
                  end_time: "2026-05-15T11:00:00Z"
      responses:
        '200':
          description: Successfully processed Booking request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
              examples:
                orderStatusOutput:
                  summary: Response for Booking request
                  value:
                    status: Success
                    code : 201
                    reply: "Room Booked Successfully"
                    error: null
                    request_id: "7f3a2b1c-4d5e-6f70-8a91-b2c3d4e5f678"
                    timestamp: "2026-03-19T14:25:36.123456+00:00"
                  
        '400':
          description: Bad Request - The JSON is malformed or the request structure is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 400
                message: "Invalid JSON payload. Check for missing braces or quotes."
                request_id: "7f3a2b1c-4d5e-6f70-8a91-b2c3d4e5f678"
                timestamp: "2026-03-19T14:25:36.123456+00:00"

        '422':
          description: Unprocessable Content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  summary: Missing required booking data
                  value:
                    status: 422
                    message: "Booking failed. Please provide room ID, date, and times."
                    request_id: "7f3a2b1c-4d5e-6f70-8a91-b2c3d4e5f678"
                    timestamp: "2026-03-19T14:25:36.123456+00:00"
                emptyMessage:
                  summary: Invalid UUID  
                  value:
                    status: 422
                    message: "Please Enter the Correct Customer UUID "
                    request_id: "a1b2c3d4-e5f6-g7h8-i9j0-k1l2m3n4o5p6"
                    timestamp: "2026-03-19T14:26:00.000000+00:00"

        '500':
          description: Internal server error while processing booking request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 500
                message: "Unexpected error occurred while processing booking request."
                request_id: "7f3a2b1c-4d5e-6f70-8a91-b2c3d4e5f678"
                timestamp: "2026-03-19T14:25:36.123456+00:00"

